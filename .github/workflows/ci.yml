name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://app:app-development-only@127.0.0.1:5432/app
  BETTER_AUTH_SECRET: ci-auth-secret-with-more-than-thirty-two-characters
  BETTER_AUTH_URL: http://127.0.0.1:4000

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm verify
      - run: pnpm audit --prod --audit-level high

  integration:
    name: PostgreSQL and S3 integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app-development-only
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      s3mock:
        image: adobe/s3mock:5.1.0
        env:
          COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: wakyak-attachments
          COM_ADOBE_TESTING_S3MOCK_STORE_REGION: us-east-1
        ports:
          - 9090:9090
        options: >-
          --health-cmd "wget --spider -q http://localhost:9090/favicon.ico"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://app:app-development-only@127.0.0.1:5432/app_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
      - run: DATABASE_URL="$TEST_DATABASE_URL" pnpm db:migrate:deploy
      - run: pnpm test:integration

  container:
    name: Production container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag wakyak:ci .
